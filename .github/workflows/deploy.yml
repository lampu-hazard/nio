name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push service images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push slowmode engine
        uses: docker/build-push-action@v5
        with:
          context: ./services/slowmode-engine
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-slowmode-engine:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-slowmode-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push anomaly engine
        uses: docker/build-push-action@v5
        with:
          context: ./services/anomaly-engine
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-anomaly-engine:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-anomaly-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./apps/client
          push: true
          build-args: |
            BACKEND_URL=http://nio-server:3002
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nio-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH || './nio-server' }}
            git pull origin main
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
      
      - name: Notify Discord — Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          title: "Nio Deployed"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **By:** ${{ github.actor }}
          color: 0x00ff88
          nodetail: false

      - name: Notify Discord — Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: "Nio Deploy Failed"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **By:** ${{ github.actor }}
            Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          color: 0xff4444